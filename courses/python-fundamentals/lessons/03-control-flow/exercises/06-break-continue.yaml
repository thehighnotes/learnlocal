id: break-continue
title: "Break and Continue"
type: write

prompt: |
  Print the odd numbers from 1 to 10, but stop (do not print) when you
  reach 7. Use `continue` to skip even numbers and `break` to stop at 7.

  Expected output: 1, 3, 5 (each on its own line).

starter: |
  # Loop through 1 to 10
  # Skip even numbers with continue
  # Stop at 7 with break (don't print 7)
  # Print the odd numbers

validation:
  method: output
  expected_output: |
    1
    3
    5

hints:
  - "Use for i in range(1, 11) to loop from 1 to 10."
  - "Check for break first: if i == 7, break out of the loop before printing."
  - "Then check for even: if i % 2 == 0, continue to skip to the next iteration. Otherwise, print i."

solution: |
  for i in range(1, 11):
      if i == 7:
          break
      if i % 2 == 0:
          continue
      print(i)

explanation: |
  This exercise combines break and continue in one loop:

  1. `for i in range(1, 11)` iterates from 1 to 10.
  2. `if i == 7: break` exits the loop entirely when i reaches 7. Since
     break happens before print, 7 is never printed.
  3. `if i % 2 == 0: continue` skips even numbers. When continue runs,
     Python jumps back to the top of the loop with the next value of i.
  4. `print(i)` only runs for odd numbers below 7: 1, 3, 5.

  The order of checks matters. The break check must come before continue,
  otherwise i=7 would be caught by the odd-number path and printed before
  we could break. And the break check must come before print, so that 7
  itself is never printed.
