recap: |
  You learned:
  - Dictionaries store key-value pairs in {} with key: value syntax
  - Access values with dict[key] or dict.get(key, default)
  - keys(), values(), items() provide different views of the data
  - Add or update entries with dict[key] = value
  - Iterate with for key in dict or for key, value in dict.items()
  - dict.get() avoids KeyError by returning a default value
  - Dictionaries are perfect for counting and grouping data
