recap: |
  You learned:
  - python3 --version checks your Python installation
  - python3 script.py runs a Python script
  - python3 -c lets you run Python one-liners from the terminal
  - print() displays output to the terminal
  - Strings use single or double quotes
  - Escape sequences like \n and \t insert special characters
  - input() reads text from the user
