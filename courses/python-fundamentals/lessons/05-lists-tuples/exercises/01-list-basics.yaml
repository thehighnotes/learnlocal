id: list-basics
title: "List Basics"
type: write

prompt: |
  Create a list containing the numbers `10, 20, 30, 40, 50`. Then use a `for`
  loop to print each element on its own line.

starter: |
  # Create a list of numbers [10, 20, 30, 40, 50]


  # Use a for loop to print each element

validation:
  method: output
  expected_output: "10\n20\n30\n40\n50"

hints:
  - "Create the list with `numbers = [10, 20, 30, 40, 50]`."
  - "Loop with `for n in numbers:` and `print(n)` inside the loop body."

solution: |
  numbers = [10, 20, 30, 40, 50]

  for n in numbers:
      print(n)

explanation: |
  `[10, 20, 30, 40, 50]` creates a list with five integer elements. The `for`
  loop iterates over the list, assigning each element to `n` in turn. `print(n)`
  outputs each value on its own line. This is the most common way to process
  every element in a list. Lists maintain their order, so the elements are
  always printed in the order they appear: 10, 20, 30, 40, 50.
