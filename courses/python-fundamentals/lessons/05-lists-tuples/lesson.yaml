recap: |
  You learned:
  - Lists are ordered, mutable collections created with []
  - Access elements by index (0-based), negative indices count from the end
  - append(), insert(), remove(), pop() modify lists in place
  - Slicing [start:stop:step] extracts sublists
  - List comprehensions [expr for x in iterable] create lists concisely
  - min() and max() find extremes, or iterate manually
  - Tuples are immutable sequences created with () — use for fixed data
  - sorted() returns a new sorted list, .sort() sorts in place
