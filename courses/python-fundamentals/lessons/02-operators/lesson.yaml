recap: |
  You learned:
  - Python supports +, -, *, /, ** (power), // (floor division), % (modulo)
  - Comparison operators (==, !=, <, >, <=, >=) return True or False
  - Logical operators: and, or, not (words, not symbols)
  - // truncates to the nearest integer, % gives the remainder
  - Strings support + (concatenation) and * (repetition)
  - Augmented assignment (+=, -=, *=) updates a variable in place
  - int(), float(), str() convert between types
