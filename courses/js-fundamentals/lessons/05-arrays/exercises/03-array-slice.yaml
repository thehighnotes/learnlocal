id: array-slice
title: "Array Slice"
type: write

prompt: |
  Given the array ["red", "green", "blue", "yellow", "purple"], use .slice()
  to extract elements at indices 1 through 3 (inclusive) and print them
  joined with ", ".

  Expected output: green, blue, yellow

  Remember: .slice(start, end) extracts from start up to but NOT including end.

starter: |
  const colors = ["red", "green", "blue", "yellow", "purple"];
  // Use .slice() to get elements 1-3, then print joined with ", "

validation:
  method: output
  expected_output: "green, blue, yellow"

hints:
  - ".slice(start, end) extracts from index start up to but not including index end."
  - "To get indices 1, 2, and 3, use .slice(1, 4) — start at 1, end before 4."
  - "console.log(colors.slice(1, 4).join(\", \"));"

solution: |
  const colors = ["red", "green", "blue", "yellow", "purple"];
  console.log(colors.slice(1, 4).join(", "));

explanation: |
  `.slice(start, end)` returns a new array containing elements from index
  `start` up to (but not including) index `end`:

  - `.slice(1, 4)` gets indices 1, 2, 3 → ["green", "blue", "yellow"]
  - The original array is not modified (slice is non-mutating)

  The "up to but not including" convention is used throughout JavaScript
  (and many other languages). It means the number of elements returned
  equals `end - start` (4 - 1 = 3 elements).

  Other useful slice patterns:
  - `.slice(2)` — from index 2 to the end
  - `.slice(-2)` — the last 2 elements
  - `.slice()` — a shallow copy of the entire array
