recap: |
  You learned:
  - Function declarations use the function keyword
  - Parameters receive values, return sends values back
  - Default parameters provide fallback values
  - Arrow functions (=>) are a concise alternative syntax
  - Variables declared inside a function are local to that function
  - Recursive functions call themselves with a base case to stop
