id: logical
title: "Logical Operators"
type: write

prompt: |
  Print the results of three logical operations, one per line:
  1. true && (5 > 3)
  2. false || (10 < 5)
  3. !(7 === 7)

  Expected output:
  true
  false
  false

starter: |
  // Print three logical operation results

validation:
  method: output
  expected_output: "true\nfalse\nfalse"

hints:
  - "&& (AND) returns true only if both sides are true."
  - "|| (OR) returns true if at least one side is true. false || false = false."
  - "! (NOT) flips the value: !(true) = false, !(false) = true."

solution: |
  console.log(true && (5 > 3));
  console.log(false || (10 < 5));
  console.log(!(7 === 7));

explanation: |
  Logical operators combine boolean values:

  - `true && (5 > 3)` → `true && true` → true. Both must be true for && to
    return true.
  - `false || (10 < 5)` → `false || false` → false. At least one must be
    true for || to return true. Neither is, so the result is false.
  - `!(7 === 7)` → `!(true)` → false. The ! operator inverts the boolean.

  JavaScript uses short-circuit evaluation: with &&, if the left side is
  false, the right side is never evaluated. With ||, if the left side is
  true, the right side is skipped. This matters when the right side has
  side effects (like function calls).
