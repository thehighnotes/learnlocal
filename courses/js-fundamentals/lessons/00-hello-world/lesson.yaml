recap: |
  You learned:
  - node --version confirms Node.js is installed
  - console.log() displays output to the terminal
  - Strings use single or double quotes (or backticks)
  - node runs .js files directly from the command line
  - node -e evaluates inline JavaScript expressions
  - Escape sequences like \n and \t insert special characters
  - Reading stdin uses require("fs").readFileSync("/dev/stdin", "utf8")
  - Node.js runs code top to bottom, no main() function needed
