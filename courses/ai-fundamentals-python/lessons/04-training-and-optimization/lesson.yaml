recap: |
  You learned:
  - Gradient descent moves parameters in the direction that reduces loss
  - The learning rate controls step size: too small is slow, too large overshoots
  - Batching splits data into smaller groups processed one at a time
  - Train/validation splits let you measure generalization vs memorization
  - Shuffling data each epoch prevents the model from learning order instead of patterns
  - Learning rate schedules reduce the rate over time for finer convergence
  - A training step has four stages: forward, loss, backward, update
