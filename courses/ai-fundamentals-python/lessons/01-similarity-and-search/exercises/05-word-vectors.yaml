id: word-vectors
title: "Word Vectors"
type: write

prompt: |
  Given a dictionary mapping words to vectors, find the word most similar to
  "cat" (excluding "cat" itself). Use cosine similarity.

  ```python
  words = {
      "cat":    [0.9, 0.1, 0.0],
      "dog":    [0.8, 0.2, 0.1],
      "kitten": [0.85, 0.15, 0.0],
      "car":    [0.0, 0.1, 0.9],
  }
  ```

  Print just the word name.

