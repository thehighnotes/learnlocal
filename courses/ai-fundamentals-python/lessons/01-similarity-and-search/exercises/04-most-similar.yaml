id: most-similar
title: "Find the Most Similar"
type: write

prompt: |
  Given a query vector and a list of document vectors, find the most similar
  document by cosine similarity. Print which document is most similar.

  ```
  query     = [1, 0, 1]
  documents = [
      [0, 1, 0],   # document 0
      [1, 0, 0],   # document 1
      [1, 0, 1],   # document 2
  ]
  ```

  Print the result in the format: `document N`

