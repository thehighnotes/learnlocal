id: opposite-vectors
title: "Opposite Vectors"
type: predict

prompt: |
  What does this code print?

  ```python
  import math

  a = [1, 0]
  b = [-1, 0]

  d = sum(a[i] * b[i] for i in range(len(a)))
  mag_a = math.sqrt(sum(x**2 for x in a))
  mag_b = math.sqrt(sum(x**2 for x in b))
  cos_sim = d / (mag_a * mag_b)
  print(round(cos_sim, 1))
  ```

  Think about the direction of these two vectors. One points right, the other
  points left.

