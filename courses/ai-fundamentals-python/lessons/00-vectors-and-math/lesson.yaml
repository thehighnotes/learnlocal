recap: |
  You learned:
  - Vectors are just Python lists of numbers
  - Vector addition adds corresponding elements
  - The dot product multiplies pairs and sums the results
  - Magnitude is the square root of the sum of squares (the vector's "length")
  - Normalization divides by magnitude to get a unit vector
  - Matrix-vector multiplication applies each row's dot product
  - Weighted sums are the foundation of how neurons compute
