id: matrix-vector
title: "Matrix-Vector Multiplication"
type: write

prompt: |
  Multiply a matrix by a vector. Each row of the matrix computes a dot product
  with the vector.

  Given:
  ```
  matrix = [[1, 2], [3, 4]]
  vector = [5, 6]
  ```

  Row 0: 1*5 + 2*6 = 17
  Row 1: 3*5 + 4*6 = 39

  Print the result as a list.

starter: |
  matrix = [[1, 2], [3, 4]]
  vector = [5, 6]

  # Multiply the matrix by the vector
  # Each row produces one output element (dot product of row and vector)


  print(result)

validation:
  method: output
  expected_output: "[17, 39]"

hints:
  - "Loop over each row in the matrix. For each row, compute the dot product with the vector and append it to the result list."
  - "Try: `result = [sum(row[i] * vector[i] for i in range(len(vector))) for row in matrix]`"

solution: |
  matrix = [[1, 2], [3, 4]]
  vector = [5, 6]

  result = [sum(row[i] * vector[i] for i in range(len(vector))) for row in matrix]

  print(result)

explanation: |
  For each row in the matrix, we compute the dot product with the vector:
  - Row [1, 2] dot [5, 6] = 1*5 + 2*6 = 17
  - Row [3, 4] dot [5, 6] = 3*5 + 4*6 = 39

  Matrix-vector multiplication is how neural networks transform data between
  layers. The matrix contains the learned weights, and the vector is the input
  data. Each output element is a weighted combination of all inputs.
