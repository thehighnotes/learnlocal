recap: |
  You learned:
  - Accuracy can differ dramatically between demographic groups
  - Demographic parity checks if positive prediction rates are equal across groups
  - The 4/5ths rule: disparate impact ratio below 0.80 signals potential discrimination
  - Biased training data produces biased models — rebalancing data improves fairness
  - Confusion matrices (TP, FP, TN, FN) reveal where errors concentrate
  - Equalized odds requires equal TPR and FPR across groups
  - A fairness report combines multiple metrics for a complete picture
