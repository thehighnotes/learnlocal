recap: |
  You learned:
  - The step function outputs 1 if input >= 0, else 0 — the simplest decision maker
  - Sigmoid squishes any number into the range (0, 1) — smooth and differentiable
  - ReLU returns max(0, x) — the most common modern activation function
  - A neuron computes: activate(dot(inputs, weights) + bias)
  - A perceptron can learn AND and OR (linearly separable problems)
  - A single perceptron cannot learn XOR — you need multiple layers
