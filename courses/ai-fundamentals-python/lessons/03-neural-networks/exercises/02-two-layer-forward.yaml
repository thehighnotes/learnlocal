id: two-layer-forward
title: "Two-Layer Forward Pass"
type: write

prompt: |
  Chain two layers together. The output of the first (hidden) layer becomes the
  input to the second (output) layer.

  Layer 1 (hidden): 2 inputs → 2 neurons
  - weights = [[0.5, 0.1], [0.3, 0.7]], biases = [0.3, 0.3]

  Layer 2 (output): 2 inputs → 1 neuron
  - weights = [[0.4, 0.6]], biases = [-0.5]

  Use a `layer_forward` function and call it twice. Print the final output
  rounded to 2 decimal places.

starter: |
  import math

  def sigmoid(x):
      return 1 / (1 + math.exp(-x))

  def layer_forward(inputs, weights, biases):
      output = []
      for i in range(len(weights)):
          z = sum(weights[i][j] * inputs[j] for j in range(len(inputs))) + biases[i]
          output.append(sigmoid(z))
      return output

  inputs = [1.0, 2.0]

  # Layer 1 (hidden)
  w1 = [[0.5, 0.1], [0.3, 0.7]]
  b1 = [0.3, 0.3]

  # Layer 2 (output)
  w2 = [[0.4, 0.6]]
  b2 = [-0.5]

  # Forward pass through both layers


  print([round(x, 2) for x in output])

validation:
  method: output
  expected_output: "[0.58]"

hints:
  - "Call `layer_forward` twice. First with the inputs to get the hidden output, then with the hidden output to get the final output."
  - "Use: `hidden = layer_forward(inputs, w1, b1)` then `output = layer_forward(hidden, w2, b2)`"

solution: |
  import math

  def sigmoid(x):
      return 1 / (1 + math.exp(-x))

  def layer_forward(inputs, weights, biases):
      output = []
      for i in range(len(weights)):
          z = sum(weights[i][j] * inputs[j] for j in range(len(inputs))) + biases[i]
          output.append(sigmoid(z))
      return output

  inputs = [1.0, 2.0]

  w1 = [[0.5, 0.1], [0.3, 0.7]]
  b1 = [0.3, 0.3]

  w2 = [[0.4, 0.6]]
  b2 = [-0.5]

  hidden = layer_forward(inputs, w1, b1)
  output = layer_forward(hidden, w2, b2)

  print([round(x, 2) for x in output])

explanation: |
  Hidden layer: inputs [1.0, 2.0] → [0.73, 0.88] (from the previous exercise).

  Output layer: the output neuron computes:
  z = 0.4*0.73 + 0.6*0.88 - 0.5 = 0.292 + 0.528 - 0.5 = 0.32.
  sigmoid(0.32) ≈ 0.58.

  This is forward propagation: data flows forward through each layer. The
  hidden layer transformed the 2D input into a different 2D representation,
  and the output layer combined those into a single prediction.
