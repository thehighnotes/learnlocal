recap: |
  You learned:
  - A layer applies matrix-vector multiply + bias + activation to all neurons at once
  - Forward propagation chains layers: input → hidden → output
  - MSE loss measures how far predictions are from targets
  - The sigmoid derivative is sigmoid(x) * (1 - sigmoid(x))
  - Gradient descent updates weights by subtracting lr * gradient
  - Backpropagation computes gradients via the chain rule
  - A 2-layer network can solve XOR — the problem one perceptron could not
