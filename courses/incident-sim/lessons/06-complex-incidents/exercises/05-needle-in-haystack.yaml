id: needle-in-haystack
title: "Needle in a Haystack"
type: command
prompt: |
  ALERT: Intermittent 500 errors on the checkout endpoint. Severity: HIGH.

  Most requests are succeeding, but a small percentage are causing 500
  Internal Server Errors. The access log has over 200 entries. Most are
  fine. You need to find the pattern.

  Look at the 500s in `access.log`. They all share something in common:
  a specific query parameter that the backend can't handle.

  Find the bad parameter value and write it to `answer.txt`. Just the
  value, nothing else.
starter: |
  # Find what the 500 requests have in common
  # Write the bad parameter value to answer.txt
environment:
  files:
    - path: access.log
      content: |
        2024-03-15 09:00:01 192.168.1.10 GET /api/products?page=1 200 12ms
        2024-03-15 09:00:01 192.168.1.22 GET /api/products?page=2 200 15ms
