        2024-03-15 09:00:24 192.168.1.10 GET /api/health 200 2ms
        2024-03-15 09:00:25 10.0.0.5 POST /api/checkout?cart_id=z2a3b4 200 50ms
        2024-03-15 09:00:25 192.168.1.99 GET /api/products?page=1 200 11ms
validation:
  method: state
  assertions:
    - file_exists: answer.txt
    - file_contains:
        path: answer.txt
        content: "null"
hints:
  - "Filter for the 500s: `grep 500 access.log` — what do they all have in common?"
  - "Every 500 request has `cart_id=null`. The parameter value `null` is causing the crash."
  - "`echo 'null' > answer.txt`"
solution: |
  echo 'null' > answer.txt
explanation: |
  Every 500 error came from the same client (172.16.0.2) hitting the
  checkout endpoint with `cart_id=null`. The backend doesn't handle the
  string "null" as a cart ID — it crashes trying to look it up. This is
  a classic bug: a frontend that sends the literal string "null" instead
  of omitting the parameter when no cart exists. The pattern-finding
  skill — filtering by status code, then looking for commonalities — is
  fundamental to incident investigation.
