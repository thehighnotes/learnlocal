        2024-03-15 09:00:03 10.0.0.8 POST /api/checkout?cart_id=d4e5f6 200 52ms
        2024-03-15 09:00:03 192.168.1.33 GET /api/products?page=1 200 11ms
        2024-03-15 09:00:04 172.16.0.2 POST /api/checkout?cart_id=null 500 3ms
        2024-03-15 09:00:04 192.168.1.10 GET /api/health 200 2ms
