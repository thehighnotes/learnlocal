id: complex-incidents
title: "Complex Incidents"
description: "Multiple things are wrong simultaneously. Triage, prioritize, and fix — this is the real thing."
estimated_minutes: 35
content: content.md
teaches: [multi-system-triage, root-cause-analysis, post-mortem, incident-command]
exercises:
  - midnight-pager
  - data-corruption
  - deploy-gone-wrong
