id: extract-ips
title: "Extract Unique IP Addresses"
type: command
prompt: |
  SECURITY ALERT: A spike in failed login attempts. Security team needs a
  list of every unique IP address in the access log to cross-reference
  against their blocklist.

  Extract all unique IP addresses from `access.log`, sort them, and write
  the result to `ips.txt` — one IP per line, sorted in default sort order.
starter: |
  # Extract unique, sorted IP addresses from access.log
  # Write to ips.txt, one per line
environment:
  setup:
    - name: setup
      command: sh
      args: ["-c", "cd {dir} && cat > access.log << 'ACCESSEOF'\n192.168.1.50 - - [15/Mar/2024:14:30:01 +0000] \"GET /api/users HTTP/1.1\" 200 1234\n10.0.0.22 - - [15/Mar/2024:14:30:02 +0000] \"GET /api/products HTTP/1.1\" 200 5678\n172.16.0.5 - - [15/Mar/2024:14:30:03 +0000] \"POST /api/login HTTP/1.1\" 401 45\n192.168.1.50 - - [15/Mar/2024:14:30:04 +0000] \"POST /api/orders HTTP/1.1\" 200 890\n10.0.0.15 - - [15/Mar/2024:14:30:05 +0000] \"POST /api/login HTTP/1.1\" 401 45\n192.168.1.100 - - [15/Mar/2024:14:30:06 +0000] \"GET /api/health HTTP/1.1\" 200 12\n10.0.0.22 - - [15/Mar/2024:14:30:07 +0000] \"POST /api/login HTTP/1.1\" 401 45\n172.16.0.8 - - [15/Mar/2024:14:30:08 +0000] \"GET /api/products HTTP/1.1\" 200 5678\n10.0.0.15 - - [15/Mar/2024:14:30:09 +0000] \"POST /api/login HTTP/1.1\" 401 45\n192.168.1.50 - - [15/Mar/2024:14:30:10 +0000] \"GET /api/orders HTTP/1.1\" 200 3456\n172.16.0.5 - - [15/Mar/2024:14:30:11 +0000] \"POST /api/login HTTP/1.1\" 401 45\n10.0.0.22 - - [15/Mar/2024:14:30:12 +0000] \"POST /api/login HTTP/1.1\" 401 45\n192.168.1.100 - - [15/Mar/2024:14:30:13 +0000] \"GET /api/users HTTP/1.1\" 200 1234\n172.16.0.8 - - [15/Mar/2024:14:30:14 +0000] \"GET /api/users/42 HTTP/1.1\" 200 567\n10.0.0.15 - - [15/Mar/2024:14:30:15 +0000] \"POST /api/login HTTP/1.1\" 401 45\n192.168.1.50 - - [15/Mar/2024:14:30:16 +0000] \"GET /api/products HTTP/1.1\" 200 5678\nACCESSEOF"]
validation:
  method: state
  assertions:
    - file_exists: ips.txt
    - file_contains:
        path: ips.txt
        content: "10.0.0.15"
    - file_contains:
        path: ips.txt
        content: "10.0.0.22"
    - file_contains:
        path: ips.txt
        content: "172.16.0.5"
    - file_contains:
        path: ips.txt
        content: "172.16.0.8"
    - file_contains:
        path: ips.txt
        content: "192.168.1.50"
    - file_contains:
        path: ips.txt
        content: "192.168.1.100"
hints:
  - "The IP address is the first field in each line. Use awk '{print $1}' to extract it."
  - "Pipeline: awk '{print $1}' access.log | sort | uniq"
  - "awk '{print $1}' access.log | sort -u > ips.txt"
solution: |
  awk '{print $1}' access.log | sort -u > ips.txt
explanation: |
  awk '{print $1}' extracts the first field (IP address), sort -u sorts and
  removes duplicates in one step (equivalent to sort | uniq). There were 6
  unique IPs across 16 requests. In a real security incident, you'd correlate
  these with the failed login attempts — IPs 10.0.0.15, 10.0.0.22, and
  172.16.0.5 all had 401 responses on /api/login, suggesting a brute-force
  attack from the 10.0.0.x and 172.16.0.x subnets.
