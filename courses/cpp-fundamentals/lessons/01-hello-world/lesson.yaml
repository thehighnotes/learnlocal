recap: |
  You learned:
  - g++ --version checks your compiler installation
  - g++ -o name file.cpp compiles C++ source to an executable
  - You can pipe input to programs with echo ... | ./program
  - Every C++ program needs a main() function as its entry point
  - #include brings in library headers like <iostream>
  - std::cout prints output to the terminal
  - Comments document code without affecting behavior
