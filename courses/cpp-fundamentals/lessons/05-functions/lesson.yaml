recap: |
  You learned:
  - Functions group reusable code with a name
  - Parameters let functions accept input
  - Return values let functions produce output
  - Overloading: same name, different parameter types
  - Pass by reference modifies the original variable
  - Default parameters provide fallback values
  - Recursion: functions calling themselves with a base case
