id: struct-function
title: "Return a Struct from a Function"
type: write

prompt: |
  Define a struct `Point` with two `double` members: `x` and `y`.
  Write a function `Point midpoint(Point a, Point b)` that returns the
  midpoint of two points. In `main`, create `p1{0, 0}` and `p2{4, 6}`,
  compute the midpoint, and print the x and y values separated by a space.

starter: |
  #include <iostream>

  // Define your Point struct here

  // Write the midpoint() function here

  int main() {
      // Create p1{0, 0} and p2{4, 6}

      // Compute the midpoint

      // Print: x y (separated by a space)
      std::cout << /* your code here */ << std::endl;

      return 0;
  }

validation:
  method: output
  expected_output: "2 3"

hints:
  - "The midpoint formula: x = (a.x + b.x) / 2, y = (a.y + b.y) / 2."
  - "Return a new Point from the function: return Point{(a.x + b.x) / 2, (a.y + b.y) / 2};"
  - "In main, store the result: Point mid = midpoint(p1, p2); then print mid.x and mid.y. Since 2.0 and 3.0 are whole numbers, std::cout prints them as 2 and 3."

solution: |
  #include <iostream>

  struct Point {
      double x;
      double y;
  };

  Point midpoint(Point a, Point b) {
      return Point{(a.x + b.x) / 2, (a.y + b.y) / 2};
  }

  int main() {
      Point p1{0, 0};
      Point p2{4, 6};
      Point mid = midpoint(p1, p2);
      std::cout << mid.x << " " << mid.y << std::endl;
      return 0;
  }

explanation: |
  Functions can return structs just like any other type. `midpoint` takes two
  Points by value, computes the average of their coordinates, and returns a
  new Point with the result. The brace initialization `Point{...}` constructs
  the return value directly. In main, we store the returned Point in `mid` and
  access its members. Since 2.0 and 3.0 have no fractional part, `std::cout`
  prints them without a decimal point as `2` and `3`.
