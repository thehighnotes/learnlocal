recap: |
  You learned:
  - Pointers store memory addresses of other variables
  - & gets the address, * dereferences the pointer
  - Pointer arithmetic moves by element size, not bytes
  - References are aliases — once bound, they always refer to the same variable
  - nullptr represents a pointer that points to nothing
  - Arrays decay to pointers when passed to functions
  - Always check pointers before dereferencing if they might be null
