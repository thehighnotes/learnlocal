recap: |
  You learned:
  - if/else if/else for conditional branching
  - switch for multi-way branching on a single value
  - while loops repeat while a condition is true
  - for loops are ideal when you know the iteration count
  - do-while guarantees at least one execution
  - break exits a loop early, continue skips to the next iteration
  - Nested loops for working with 2D patterns
  - FizzBuzz: combining loops with conditionals
