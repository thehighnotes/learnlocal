id: pipes-redirection
title: "Pipes & Redirection"
description: "Master stdin/stdout/stderr, redirection operators, pipes, tee, and command substitution."
estimated_minutes: 30
content: content.md
teaches: [pipes, redirection, stdout, stderr, tee, command-substitution]
exercises:
  - redirect-output
  - append-output
  - pipe-basics
