id: break-continue
title: "Odd Numbers Only"
type: write

prompt: |
  Loop through numbers 1 to 20. Print only the odd numbers, each on its
  own line. When you reach 15, stop the loop immediately — do NOT print 15.

  Use `continue` to skip even numbers and `break` to stop at 15.

starter: |
  package main

  import "fmt"

  func main() {
      // Loop 1 to 20
      // Skip even numbers with continue
      // Stop at 15 with break (before printing)
      // Print odd numbers
  }

validation:
  method: output
  expected_output: |
    1
    3
    5
    7
    9
    11
    13

hints:
  - "Check the break condition first: `if i == 15 { break }` — this ensures you stop before printing 15."
  - "Then check if the number is even: `if i%2 == 0 { continue }` — this skips to the next iteration without printing."
  - "The order matters: check break before continue, so 15 never reaches the even/odd check."

solution: |
  package main

  import "fmt"

  func main() {
      for i := 1; i <= 20; i++ {
          if i == 15 {
              break
          }
          if i%2 == 0 {
              continue
          }
          fmt.Println(i)
      }
  }

explanation: |
  The loop demonstrates both `break` and `continue`:

  1. `if i == 15 { break }` — checks first whether we have reached 15.
     If so, we exit the loop entirely. Since this check comes before
     the print, 15 is never printed.

  2. `if i%2 == 0 { continue }` — skips even numbers. The `continue`
     jumps back to the top of the loop (the post statement `i++` still
     runs), so `fmt.Println` is never reached for even values.

  3. Only odd numbers below 15 make it past both guards to be printed:
     1, 3, 5, 7, 9, 11, 13.

  The ordering of break before continue is important. If you checked
  evenness first, it would not matter for 15 (since 15 is odd), but
  making the exit condition the very first check is a clear pattern.
