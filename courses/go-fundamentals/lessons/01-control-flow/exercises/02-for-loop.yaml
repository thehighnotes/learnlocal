id: for-loop
title: "Counting and Summing"
type: write

prompt: |
  Use a for loop to print the numbers 1 through 5, each on its own line.

  Then use another for loop to compute the sum of all integers from 1 to 100.
  Print the result in the format "sum=5050" (no spaces around the equals sign).

starter: |
  package main

  import "fmt"

  func main() {
      // Print numbers 1 to 5, each on its own line

      // Sum integers 1 to 100 and print as "sum=NNNN"
  }

validation:
  method: output
  expected_output: |
    1
    2
    3
    4
    5
    sum=5050

hints:
  - "Use `for i := 1; i <= 5; i++` for the first loop — Go's for loop looks like C but without parentheses."
  - "For the sum, declare a variable before the loop: `sum := 0`, then add each i inside the loop."
  - "Use fmt.Printf(\"sum=%d\\n\", sum) or fmt.Println(\"sum=\" + ...) to print the result. fmt.Printf is cleaner here."

solution: |
  package main

  import "fmt"

  func main() {
      for i := 1; i <= 5; i++ {
          fmt.Println(i)
      }

      sum := 0
      for i := 1; i <= 100; i++ {
          sum += i
      }
      fmt.Printf("sum=%d\n", sum)
  }

explanation: |
  This exercise uses Go's only loop keyword — `for` — in two ways:

  1. The first loop counts from 1 to 5 using the classic three-clause form:
     `for init; condition; post`. No parentheses needed.

  2. The second loop accumulates a running total. We declare `sum := 0`
     before the loop, then add each value of `i` with `sum += i`.

  The sum of 1 to 100 is 5050 (the famous Gauss formula: n*(n+1)/2 = 5050).
  We use `fmt.Printf` with a format string to print "sum=5050" with no
  spaces. `%d` is the verb for integers, and `\n` adds the trailing newline.
