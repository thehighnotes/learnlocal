id: basic-interface
title: "Basic Interface"
type: write

prompt: |
  Define a `Shape` interface with a single method `Area() float64`. Then create
  two structs — `Circle` (with a `Radius float64` field) and `Rectangle` (with
  `Width` and `Height float64` fields) — and implement `Area()` for both.

  In `main`, create a `Circle` with radius 5 and a `Rectangle` with width 5 and
  height 3. Print their areas using `fmt.Printf` with the format `"circle: %.2f\n"`
  and `"rectangle: %.2f\n"`.

