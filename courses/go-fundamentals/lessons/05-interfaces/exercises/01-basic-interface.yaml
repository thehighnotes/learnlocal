hints:
  - "Define the interface: `type Shape interface { Area() float64 }`."
  - "Circle's area is `math.Pi * c.Radius * c.Radius`. Rectangle's area is `r.Width * r.Height`."
  - "Use `fmt.Printf(\"circle: %.2f\\n\", c.Area())` to print with two decimal places."

solution: |
  package main

  import (
  	"fmt"
  	"math"
  )

  type Shape interface {
  	Area() float64
  }

  type Circle struct {
  	Radius float64
  }

  func (c Circle) Area() float64 {
  	return math.Pi * c.Radius * c.Radius
  }

  type Rectangle struct {
  	Width, Height float64
  }

  func (r Rectangle) Area() float64 {
  	return r.Width * r.Height
  }

  func main() {
  	c := Circle{Radius: 5}
  	r := Rectangle{Width: 5, Height: 3}

  	fmt.Printf("circle: %.2f\n", c.Area())
  	fmt.Printf("rectangle: %.2f\n", r.Area())
  }

explanation: |
  The `Shape` interface declares a single method: `Area() float64`. Any type that
  has this method automatically satisfies the interface. `Circle` computes area
  using `math.Pi * r^2`, and `Rectangle` uses `width * height`. Both types
  implement `Area()` with a value receiver, so both are `Shape` values. The
  `fmt.Printf` call with `%.2f` formats the float to two decimal places.
