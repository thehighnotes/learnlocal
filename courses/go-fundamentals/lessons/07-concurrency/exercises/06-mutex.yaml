id: mutex
title: "Mutex for Shared State"
type: write

prompt: |
  Use sync.Mutex to safely increment a shared counter from 1000 goroutines.
  Each goroutine increments the counter exactly once. Use sync.WaitGroup to
  wait for all goroutines to finish, then print the final count.

  Without the mutex, the counter would be unpredictable due to data races.
  With the mutex, it is always exactly 1000.

  Expected output: count=1000

starter: |
  package main

  import (
      "fmt"
      "sync"
  )

  func main() {
      var mu sync.Mutex
      var wg sync.WaitGroup
      counter := 0

      for i := 0; i < 1000; i++ {
          wg.Add(1)
          // Launch a goroutine that:
          // 1. Locks the mutex
          // 2. Increments counter
          // 3. Unlocks the mutex
          // 4. Calls wg.Done()
      }

      wg.Wait()
      fmt.Printf("count=%d\n", counter)
      _ = mu // remove when you use mu
  }

validation:
  method: output
  expected_output: "count=1000\n"

hints:
  - "Launch the goroutine with: go func() { defer wg.Done(); mu.Lock(); counter++; mu.Unlock() }()"
  - "You can also use defer for unlock: mu.Lock(); defer mu.Unlock(); counter++"
  - "The WaitGroup ensures main waits for all 1000 goroutines before printing"

solution: |
  package main

  import (
      "fmt"
      "sync"
  )

  func main() {
      var mu sync.Mutex
      var wg sync.WaitGroup
      counter := 0

      for i := 0; i < 1000; i++ {
          wg.Add(1)
          go func() {
              defer wg.Done()
              mu.Lock()
              counter++
              mu.Unlock()
          }()
      }

      wg.Wait()
      fmt.Printf("count=%d\n", counter)
  }

explanation: |
  Each goroutine calls `mu.Lock()` before incrementing the counter. If another
  goroutine already holds the lock, `Lock()` blocks until the lock is released.
  This ensures only one goroutine modifies `counter` at a time.

  The pattern is: Lock -> modify shared state -> Unlock. The `defer wg.Done()`
  ensures the WaitGroup counter is decremented even if something goes wrong.

  Without the mutex, multiple goroutines could read the same value of `counter`,
  increment it, and write the same result back -- losing increments. This is
  called a data race. With the mutex, the final count is always exactly 1000.

  You can verify this with Go's race detector: `go run -race main.go`. It
  would report a race without the mutex, and no races with it.
