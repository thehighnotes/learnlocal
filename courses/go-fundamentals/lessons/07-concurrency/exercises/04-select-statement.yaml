id: select-statement
title: "Select Statement"
type: write

prompt: |
  Create two buffered channels (capacity 1 each): ch1 and ch2.
  Send "ping" into ch1, then use a select statement to receive and print
  whichever channel has data.
  Next, send "pong" into ch2, then use another select statement to receive
  and print from whichever channel has data.

  Because only one channel has data at each select, the output is deterministic.

  Expected output:
  ping
  pong

starter: |
  package main

  import "fmt"

  func main() {
      // Create two buffered channels of string, capacity 1 each

      // Send "ping" to ch1

      // Use select to receive and print from ch1 or ch2

      // Send "pong" to ch2

      // Use select to receive and print from ch1 or ch2

      _ = fmt.Println
  }

validation:
  method: output
  expected_output: "ping\npong\n"

hints:
  - "Create buffered channels: ch1 := make(chan string, 1) and ch2 := make(chan string, 1)"
  - "Send first: ch1 <- \"ping\", then select { case msg := <-ch1: ... case msg := <-ch2: ... }"
  - "Repeat: ch2 <- \"pong\", then another select with the same cases"

solution: |
  package main

  import "fmt"

  func main() {
      ch1 := make(chan string, 1)
      ch2 := make(chan string, 1)

      ch1 <- "ping"
      select {
      case msg := <-ch1:
          fmt.Println(msg)
      case msg := <-ch2:
          fmt.Println(msg)
      }

      ch2 <- "pong"
      select {
      case msg := <-ch1:
          fmt.Println(msg)
      case msg := <-ch2:
          fmt.Println(msg)
      }
  }

explanation: |
  The `select` statement waits on multiple channel operations. When only one
  channel has data, that case is always chosen -- there is no randomness.

  In the first select, only ch1 has a value ("ping"), so the ch1 case runs.
  In the second select, only ch2 has a value ("pong"), so the ch2 case runs.

  The `select` statement only introduces randomness when *multiple* cases are
  ready simultaneously. By controlling when we send, we make each select
  deterministic.

  This pattern is useful in real programs for multiplexing across network
  connections, timers, and quit signals.
