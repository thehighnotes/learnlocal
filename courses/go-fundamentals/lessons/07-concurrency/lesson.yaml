id: concurrency
title: "Goroutines & Channels"
description: "Write concurrent programs with goroutines, channels, and synchronization primitives"
estimated_minutes: 30
content: content.md
exercises:
  - goroutines
  - channels
  - buffered-channels
  - select-statement
  - waitgroup
