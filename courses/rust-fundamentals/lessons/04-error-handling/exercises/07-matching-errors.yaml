validation:
  method: output
  expected_output: "empty input\nbad input: hello\ngot negative: -5\nok: 42"

hints:
  - "Start with `#[derive(Debug)] enum InputError { Empty, NotANumber(String), Negative(i32) }`. Then implement Display with a match on self."
  - "In main, use nested matching: `match parse_positive(input) { Ok(n) => ..., Err(InputError::Empty) => ..., Err(InputError::NotANumber(s)) => ..., Err(InputError::Negative(n)) => ... }`"
  - "In parse_positive: check `s.is_empty()` first, then `s.parse::<i32>()` with `match` or `map_err`, then check `if n < 0`."

solution: |
  use std::fmt;

  #[derive(Debug)]
  enum InputError {
      Empty,
      NotANumber(String),
      Negative(i32),
  }

  impl fmt::Display for InputError {
      fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
          match self {
              InputError::Empty => write!(f, "input was empty"),
              InputError::NotANumber(s) => write!(f, "not a number: {}", s),
              InputError::Negative(n) => write!(f, "negative value: {}", n),
          }
      }
  }

  impl std::error::Error for InputError {}

  fn parse_positive(s: &str) -> Result<i32, InputError> {
      if s.is_empty() {
          return Err(InputError::Empty);
      }
      let n = s.parse::<i32>().map_err(|_| InputError::NotANumber(s.to_string()))?;
      if n < 0 {
          return Err(InputError::Negative(n));
      }
      Ok(n)
  }

  fn main() {
      let tests = ["", "hello", "-5", "42"];
      for input in &tests {
          match parse_positive(input) {
              Ok(n) => println!("ok: {}", n),
              Err(InputError::Empty) => println!("empty input"),
              Err(InputError::NotANumber(s)) => println!("bad input: {}", s),
              Err(InputError::Negative(n)) => println!("got negative: {}", n),
          }
      }
  }

explanation: |
  This exercise brings together everything from the lesson. The key pattern is
  matching on specific error variants in the caller:

  ```rust
  match result {
      Ok(n) => /* success */,
      Err(InputError::Empty) => /* handle empty */,
      Err(InputError::NotANumber(s)) => /* handle bad parse */,
      Err(InputError::Negative(n)) => /* handle negative */,
  }
  ```

  Because `InputError` is an enum, the compiler ensures you handle every variant
  (or include a wildcard `_` arm). This is fundamentally different from
  exceptions: you cannot accidentally forget to handle an error case.

  The `parse_positive` function shows the validation pipeline pattern: check
  preconditions first (empty check), then parse, then validate the parsed value.
  Each step has its own error variant, giving the caller full information about
  what went wrong and where.
