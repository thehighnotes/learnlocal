id: matching-errors
title: "Matching on Error Variants"
type: write

prompt: |
  Define a custom error enum `InputError` with three variants:
  - `Empty` — the input string was empty
  - `NotANumber(String)` — contains the invalid input string
  - `Negative(i32)` — contains the negative value

  Implement `Debug` (derive), `Display`, and `std::error::Error` for it.
  Display messages:
  - Empty => "input was empty"
  - NotANumber(s) => "not a number: {s}"
  - Negative(n) => "negative value: {n}"

  Write `parse_positive(s: &str) -> Result<i32, InputError>` that:
  1. Returns `Err(InputError::Empty)` if `s.is_empty()`
  2. Parses as i32, returns `Err(InputError::NotANumber(s.to_string()))` on failure
  3. Returns `Err(InputError::Negative(n))` if n < 0
  4. Returns `Ok(n)` otherwise

  In `main`, test with "", "hello", "-5", and "42". For each, `match` on the
  Result and print a specific message for each error variant:
  - Ok(n) => "ok: {n}"
  - Empty => "empty input"
  - NotANumber(s) => "bad input: {s}"
  - Negative(n) => "got negative: {n}"

