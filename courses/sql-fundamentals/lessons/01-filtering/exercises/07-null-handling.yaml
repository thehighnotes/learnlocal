id: null-handling
title: "Handling NULL Values"
type: write

prompt: |
  Some employees have no manager (their manager_id is NULL). These are the
  top-level people in the company.

  Write a query that finds all employees whose manager_id IS NULL.
  Select name and department, ordered by name.

  Remember: you cannot use `= NULL` — you must use `IS NULL`.

starter: |
  -- Find employees with no manager
  -- Select name and department
  -- Order by name
  SELECT name, department
  FROM employees;

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE employees (
          id INTEGER PRIMARY KEY,
          name TEXT NOT NULL,
          department TEXT NOT NULL,
          salary REAL NOT NULL,
          hire_date TEXT NOT NULL,
          manager_id INTEGER
        );
        INSERT INTO employees VALUES (1, 'Alice Johnson', 'Engineering', 85000.0, '2020-03-15', NULL);
        INSERT INTO employees VALUES (2, 'Bob Smith', 'Engineering', 72000.0, '2021-06-01', 1);
        INSERT INTO employees VALUES (3, 'Carol Davis', 'Sales', 55000.0, '2019-11-20', 1);
        INSERT INTO employees VALUES (4, 'David Lee', 'Marketing', 62000.0, '2022-01-10', 1);
        INSERT INTO employees VALUES (5, 'Eva Martinez', 'Engineering', 95000.0, '2018-07-22', NULL);
        INSERT INTO employees VALUES (6, 'Frank Wilson', 'Sales', 48000.0, '2023-04-05', 3);
        INSERT INTO employees VALUES (7, 'Grace Kim', 'Marketing', 67000.0, '2021-09-14', 4);
        INSERT INTO employees VALUES (8, 'Henry Brown', 'Engineering', 78000.0, '2022-08-30', 5);
        INSERT INTO employees VALUES (9, 'Ivy Chen', 'Sales', 51000.0, '2023-01-18', 3);
        INSERT INTO employees VALUES (10, 'Jack Taylor', 'Marketing', 58000.0, '2024-02-01', NULL);

validation:
  method: output
  expected_output: |
    Alice Johnson|Engineering
    Eva Martinez|Engineering
    Jack Taylor|Marketing

hints:
  - "NULL is special in SQL. You cannot compare it with = or !=."
  - "Use IS NULL to test for missing values: WHERE manager_id IS NULL"
  - "Add WHERE manager_id IS NULL and ORDER BY name."

solution: |
  SELECT name, department
  FROM employees
  WHERE manager_id IS NULL
  ORDER BY name;

explanation: |
  Three employees have NULL manager_id: Alice Johnson, Eva Martinez, and Jack
  Taylor. These represent people at the top of their reporting chains.

  The key lesson: `WHERE manager_id = NULL` would return **zero rows** because
  comparing anything to NULL with = yields NULL (not true). You must use
  `IS NULL` or `IS NOT NULL` when testing for missing values.

  This is one of the most common SQL mistakes. When a query returns fewer rows
  than expected, always check whether NULL values in the filtered column might
  be silently excluded.
