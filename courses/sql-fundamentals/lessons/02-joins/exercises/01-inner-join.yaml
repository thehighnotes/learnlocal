id: inner-join
title: "Your First INNER JOIN"
type: write

prompt: |
  The database has two tables: `customers` and `orders`. Each order references
  a customer by `customer_id`.

  Write a query that returns the customer's name and the product they ordered,
  for all orders. Use an INNER JOIN to combine the two tables.

  Expected columns: customer name, product name.
  Order by: orders.id (ascending).

starter: |
  -- Join customers and orders to show who bought what
  -- Return: customer name, product name
  -- Order by: orders.id

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE customers (id INTEGER, name TEXT, city TEXT);
        INSERT INTO customers VALUES (1, 'Alice', 'Portland');
        INSERT INTO customers VALUES (2, 'Bob', 'Seattle');
        INSERT INTO customers VALUES (3, 'Charlie', 'Portland');
        INSERT INTO customers VALUES (4, 'Diana', 'Chicago');
        INSERT INTO customers VALUES (5, 'Eve', 'Seattle');
        INSERT INTO customers VALUES (6, 'Frank', 'Denver');

        CREATE TABLE orders (id INTEGER, customer_id INTEGER, product TEXT, amount REAL, order_date TEXT);
        INSERT INTO orders VALUES (1, 1, 'Laptop', 999.99, '2024-01-15');
        INSERT INTO orders VALUES (2, 1, 'Mouse', 29.99, '2024-01-15');
        INSERT INTO orders VALUES (3, 2, 'Keyboard', 79.99, '2024-02-01');
        INSERT INTO orders VALUES (4, 3, 'Monitor', 349.99, '2024-02-10');
        INSERT INTO orders VALUES (5, 2, 'Webcam', 59.99, '2024-02-15');
        INSERT INTO orders VALUES (6, 4, 'Headphones', 149.99, '2024-03-01');
        INSERT INTO orders VALUES (7, 1, 'USB Cable', 12.99, '2024-03-05');
        INSERT INTO orders VALUES (8, 5, 'Tablet', 499.99, '2024-03-10');
        INSERT INTO orders VALUES (9, 3, 'Charger', 24.99, '2024-03-15');

validation:
  method: output
  expected_output: |
    Alice|Laptop
    Alice|Mouse
    Bob|Keyboard
    Charlie|Monitor
    Bob|Webcam
    Diana|Headphones
    Alice|USB Cable
    Eve|Tablet
    Charlie|Charger

hints:
  - "Start with SELECT customers.name, orders.product FROM customers"
  - "Add INNER JOIN orders ON customers.id = orders.customer_id to link the tables"
  - "The full query is: SELECT customers.name, orders.product FROM customers INNER JOIN orders ON customers.id = orders.customer_id ORDER BY orders.id;"

solution: |
  SELECT customers.name, orders.product
  FROM customers
  INNER JOIN orders ON customers.id = orders.customer_id
  ORDER BY orders.id;

explanation: |
  `INNER JOIN` combines rows from two tables where the join condition is true.
  Here, `customers.id = orders.customer_id` links each order to its customer.

  Notice that:
  - Alice appears three times because she has three orders.
  - Frank does not appear because he has no orders — INNER JOIN only includes
    rows that match in both tables.
  - The result has 9 rows, one for each order, because every order has a
    matching customer.

  The ORDER BY uses `orders.id` to keep results in the order the purchases
  were made.
