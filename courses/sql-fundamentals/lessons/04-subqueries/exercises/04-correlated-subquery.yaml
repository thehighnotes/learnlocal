id: correlated-subquery
title: "Correlated Subquery"
type: fix

prompt: |
  This query is supposed to show each student's name alongside their personal
  best score. But it has a bug — every student shows the same score (95)
  instead of their own highest.

  The problem is in the subquery. It computes the global maximum score across
  all enrollments instead of the maximum for each specific student. Fix the
  subquery so it correlates with the outer query.

  The output should show only students who have enrollments (use a JOIN),
  grouped by student, ordered by name ascending.

starter: |
  SELECT s.name,
         (SELECT MAX(score) FROM enrollments) AS best_score
  FROM students s
  JOIN enrollments e ON s.id = e.student_id
  GROUP BY s.id
  ORDER BY s.name;

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE students (id INTEGER, name TEXT, grade_level INTEGER);
        INSERT INTO students VALUES (1, 'Alice', 10);
        INSERT INTO students VALUES (2, 'Bob', 11);
        INSERT INTO students VALUES (3, 'Charlie', 10);
        INSERT INTO students VALUES (4, 'Diana', 12);
        INSERT INTO students VALUES (5, 'Eve', 11);
        INSERT INTO students VALUES (6, 'Frank', 12);

        CREATE TABLE courses (id INTEGER, title TEXT, department TEXT);
        INSERT INTO courses VALUES (1, 'Algebra', 'Math');
        INSERT INTO courses VALUES (2, 'Biology', 'Science');
        INSERT INTO courses VALUES (3, 'History', 'Humanities');
        INSERT INTO courses VALUES (4, 'Chemistry', 'Science');
        INSERT INTO courses VALUES (5, 'Literature', 'Humanities');

        CREATE TABLE enrollments (student_id INTEGER, course_id INTEGER, score INTEGER);
        INSERT INTO enrollments VALUES (1, 1, 88);
        INSERT INTO enrollments VALUES (1, 2, 92);
        INSERT INTO enrollments VALUES (1, 3, 75);
        INSERT INTO enrollments VALUES (2, 1, 95);
        INSERT INTO enrollments VALUES (2, 4, 78);
        INSERT INTO enrollments VALUES (3, 2, 65);
        INSERT INTO enrollments VALUES (3, 3, 82);
        INSERT INTO enrollments VALUES (3, 5, 90);
        INSERT INTO enrollments VALUES (4, 1, 91);
        INSERT INTO enrollments VALUES (4, 4, 88);
        INSERT INTO enrollments VALUES (4, 5, 95);
        INSERT INTO enrollments VALUES (5, 3, 70);

validation:
  method: output
  expected_output: |
    Alice|92
    Bob|95
    Charlie|90
    Diana|95
    Eve|70

hints:
  - "The subquery needs a WHERE clause that links it to the current student in the outer query."
  - "Add WHERE student_id = s.id inside the subquery so it only considers enrollments for that specific student."
  - "Change (SELECT MAX(score) FROM enrollments) to (SELECT MAX(score) FROM enrollments WHERE student_id = s.id)"

solution: |
  SELECT s.name,
         (SELECT MAX(score) FROM enrollments WHERE student_id = s.id) AS best_score
  FROM students s
  JOIN enrollments e ON s.id = e.student_id
  GROUP BY s.id
  ORDER BY s.name;

explanation: |
  The original subquery `(SELECT MAX(score) FROM enrollments)` has no WHERE
  clause, so it scans the entire enrollments table and returns the global
  maximum (95) for every student.

  Adding `WHERE student_id = s.id` makes it a correlated subquery — it
  references `s.id` from the outer query. Now for each student, the
  subquery only looks at that student's enrollments:

  - Alice: MAX(88, 92, 75) = 92
  - Bob: MAX(95, 78) = 95
  - Charlie: MAX(65, 82, 90) = 90
  - Diana: MAX(91, 88, 95) = 95
  - Eve: MAX(70) = 70

  The key insight: without the correlation, the subquery is independent
  and runs once. With the correlation, it depends on the outer row and
  conceptually runs once per student.
