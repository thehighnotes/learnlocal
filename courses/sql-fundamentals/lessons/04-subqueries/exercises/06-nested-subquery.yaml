id: nested-subquery
title: "Nested Subquery"
type: write

prompt: |
  Find all students (other than Alice) who share at least one course with
  Alice. In other words: find Alice's courses, then find who else is in
  those courses.

  Use a nested subquery — a subquery inside another subquery:
  1. The innermost subquery finds Alice's student id.
  2. The middle subquery finds course_ids where that student is enrolled.
  3. The outer query finds distinct student names enrolled in those courses,
     excluding Alice herself.

  Order the results by name ascending.

starter: |
  -- Find students who share a course with Alice (excluding Alice)
  -- Hint: nest two subqueries — one to find Alice's id,
  --       another to find her course_ids

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE students (id INTEGER, name TEXT, grade_level INTEGER);
        INSERT INTO students VALUES (1, 'Alice', 10);
        INSERT INTO students VALUES (2, 'Bob', 11);
        INSERT INTO students VALUES (3, 'Charlie', 10);
        INSERT INTO students VALUES (4, 'Diana', 12);
        INSERT INTO students VALUES (5, 'Eve', 11);
        INSERT INTO students VALUES (6, 'Frank', 12);

        CREATE TABLE courses (id INTEGER, title TEXT, department TEXT);
        INSERT INTO courses VALUES (1, 'Algebra', 'Math');
        INSERT INTO courses VALUES (2, 'Biology', 'Science');
        INSERT INTO courses VALUES (3, 'History', 'Humanities');
        INSERT INTO courses VALUES (4, 'Chemistry', 'Science');
        INSERT INTO courses VALUES (5, 'Literature', 'Humanities');

        CREATE TABLE enrollments (student_id INTEGER, course_id INTEGER, score INTEGER);
        INSERT INTO enrollments VALUES (1, 1, 88);
        INSERT INTO enrollments VALUES (1, 2, 92);
        INSERT INTO enrollments VALUES (1, 3, 75);
        INSERT INTO enrollments VALUES (2, 1, 95);
        INSERT INTO enrollments VALUES (2, 4, 78);
        INSERT INTO enrollments VALUES (3, 2, 65);
        INSERT INTO enrollments VALUES (3, 3, 82);
        INSERT INTO enrollments VALUES (3, 5, 90);
        INSERT INTO enrollments VALUES (4, 1, 91);
        INSERT INTO enrollments VALUES (4, 4, 88);
        INSERT INTO enrollments VALUES (4, 5, 95);
        INSERT INTO enrollments VALUES (5, 3, 70);

validation:
  method: output
  expected_output: |
    Bob
    Charlie
    Diana
    Eve

hints:
  - "Start from the inside: (SELECT id FROM students WHERE name = 'Alice') returns Alice's id."
  - "Wrap that in another subquery: SELECT course_id FROM enrollments WHERE student_id = (inner query). This gives Alice's course ids."
  - |
    The full query:
    SELECT DISTINCT s.name
    FROM students s
    JOIN enrollments e ON s.id = e.student_id
    WHERE e.course_id IN (
      SELECT course_id FROM enrollments
      WHERE student_id = (SELECT id FROM students WHERE name = 'Alice')
    )
    AND s.name != 'Alice'
    ORDER BY s.name;

solution: |
  SELECT DISTINCT s.name
  FROM students s
  JOIN enrollments e ON s.id = e.student_id
  WHERE e.course_id IN (
    SELECT course_id FROM enrollments
    WHERE student_id = (SELECT id FROM students WHERE name = 'Alice')
  )
  AND s.name != 'Alice'
  ORDER BY s.name;

explanation: |
  Reading from the inside out:

  1. `(SELECT id FROM students WHERE name = 'Alice')` returns 1.
  2. `SELECT course_id FROM enrollments WHERE student_id = 1` returns
     courses 1, 2, and 3 (Algebra, Biology, History).
  3. The outer query finds all students enrolled in courses 1, 2, or 3,
     excluding Alice herself.

  Who is in those courses?
  - Course 1 (Algebra): Bob, Diana
  - Course 2 (Biology): Charlie
  - Course 3 (History): Charlie, Eve

  After DISTINCT and excluding Alice: Bob, Charlie, Diana, Eve.

  Frank is not enrolled in any of Alice's courses (in fact, Frank has no
  enrollments at all), so he does not appear.

  This pattern — nesting one subquery inside another — is common when you
  need to resolve a chain of lookups: name to id, id to courses, courses
  to classmates.
