id: from-subquery
title: "Subquery in FROM"
type: fill-blank

prompt: |
  Use a subquery in the FROM clause (a derived table) to find students who
  are enrolled in 3 or more courses.

  The inner query joins students to enrollments, groups by student, and
  counts enrollments. The outer query filters that result to only keep
  students with 3 or more courses.

  Fill in the three blanks:
  1. The join condition linking students to enrollments
  2. The second half of that join condition
  3. The minimum number of courses to filter on

starter: |
  SELECT sub.name, sub.num_courses
  FROM (
    SELECT s.name, COUNT(*) AS num_courses
    FROM students s
    JOIN enrollments e ON ___ = ___
    GROUP BY s.id
  ) AS sub
  WHERE sub.num_courses >= ___
  ORDER BY sub.name;

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE students (id INTEGER, name TEXT, grade_level INTEGER);
        INSERT INTO students VALUES (1, 'Alice', 10);
        INSERT INTO students VALUES (2, 'Bob', 11);
        INSERT INTO students VALUES (3, 'Charlie', 10);
        INSERT INTO students VALUES (4, 'Diana', 12);
        INSERT INTO students VALUES (5, 'Eve', 11);
        INSERT INTO students VALUES (6, 'Frank', 12);

        CREATE TABLE courses (id INTEGER, title TEXT, department TEXT);
        INSERT INTO courses VALUES (1, 'Algebra', 'Math');
        INSERT INTO courses VALUES (2, 'Biology', 'Science');
        INSERT INTO courses VALUES (3, 'History', 'Humanities');
        INSERT INTO courses VALUES (4, 'Chemistry', 'Science');
        INSERT INTO courses VALUES (5, 'Literature', 'Humanities');

        CREATE TABLE enrollments (student_id INTEGER, course_id INTEGER, score INTEGER);
        INSERT INTO enrollments VALUES (1, 1, 88);
        INSERT INTO enrollments VALUES (1, 2, 92);
        INSERT INTO enrollments VALUES (1, 3, 75);
        INSERT INTO enrollments VALUES (2, 1, 95);
        INSERT INTO enrollments VALUES (2, 4, 78);
        INSERT INTO enrollments VALUES (3, 2, 65);
        INSERT INTO enrollments VALUES (3, 3, 82);
        INSERT INTO enrollments VALUES (3, 5, 90);
        INSERT INTO enrollments VALUES (4, 1, 91);
        INSERT INTO enrollments VALUES (4, 4, 88);
        INSERT INTO enrollments VALUES (4, 5, 95);
        INSERT INTO enrollments VALUES (5, 3, 70);

validation:
  method: output
  expected_output: |
    Alice|3
    Charlie|3
    Diana|3

hints:
  - "The join links students to their enrollments. The student's id column matches the enrollment's student_id column."
  - "Fill in s.id = e.student_id for the join condition. For the filter, count how many courses each student has and pick the right threshold."
  - "The three blanks are: s.id, e.student_id, and 3"

solution: |
  SELECT sub.name, sub.num_courses
  FROM (
    SELECT s.name, COUNT(*) AS num_courses
    FROM students s
    JOIN enrollments e ON s.id = e.student_id
    GROUP BY s.id
  ) AS sub
  WHERE sub.num_courses >= 3
  ORDER BY sub.name;

explanation: |
  The inner query (the derived table) does the heavy lifting:

  1. Joins students to enrollments on s.id = e.student_id.
  2. Groups by student (GROUP BY s.id).
  3. Counts enrollments per student with COUNT(*).

  This produces a temporary result set with columns name and num_courses:
  Alice 3, Bob 2, Charlie 3, Diana 3, Eve 1.

  The outer query then filters this derived table with WHERE num_courses >= 3,
  keeping only Alice, Charlie, and Diana. The alias `AS sub` is required —
  every derived table in FROM must have a name.

  You could also solve this with HAVING instead of a derived table, but the
  derived table approach lets you clearly separate the aggregation step from
  the filtering step.
