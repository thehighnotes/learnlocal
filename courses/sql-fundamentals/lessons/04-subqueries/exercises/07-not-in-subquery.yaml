id: not-in-subquery
title: "NOT IN Subquery"
type: predict

prompt: |
  Study the tables and the query below, then predict what it outputs.

  **Students:** Alice (id 1), Bob (id 2), Charlie (id 3), Diana (id 4),
  Eve (id 5), Frank (id 6).

  **Enrollments:** Alice has 3, Bob has 2, Charlie has 3, Diana has 3,
  Eve has 1, Frank has 0.

  ```sql
  SELECT name FROM students
  WHERE id NOT IN (SELECT student_id FROM enrollments)
  ORDER BY name;
  ```

  NOT IN returns rows where the value does NOT match any value in the
  subquery result. Think about which student has no enrollments at all.

  Write a SELECT statement that produces the predicted output.

starter: |
  -- The query uses NOT IN to find students with zero enrollments.
  -- Which student(s) have no enrollment records?
  -- Write a SELECT that outputs the answer.

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE students (id INTEGER, name TEXT, grade_level INTEGER);
        INSERT INTO students VALUES (1, 'Alice', 10);
        INSERT INTO students VALUES (2, 'Bob', 11);
        INSERT INTO students VALUES (3, 'Charlie', 10);
        INSERT INTO students VALUES (4, 'Diana', 12);
        INSERT INTO students VALUES (5, 'Eve', 11);
        INSERT INTO students VALUES (6, 'Frank', 12);

        CREATE TABLE courses (id INTEGER, title TEXT, department TEXT);
        INSERT INTO courses VALUES (1, 'Algebra', 'Math');
        INSERT INTO courses VALUES (2, 'Biology', 'Science');
        INSERT INTO courses VALUES (3, 'History', 'Humanities');
        INSERT INTO courses VALUES (4, 'Chemistry', 'Science');
        INSERT INTO courses VALUES (5, 'Literature', 'Humanities');

        CREATE TABLE enrollments (student_id INTEGER, course_id INTEGER, score INTEGER);
        INSERT INTO enrollments VALUES (1, 1, 88);
        INSERT INTO enrollments VALUES (1, 2, 92);
        INSERT INTO enrollments VALUES (1, 3, 75);
        INSERT INTO enrollments VALUES (2, 1, 95);
        INSERT INTO enrollments VALUES (2, 4, 78);
        INSERT INTO enrollments VALUES (3, 2, 65);
        INSERT INTO enrollments VALUES (3, 3, 82);
        INSERT INTO enrollments VALUES (3, 5, 90);
        INSERT INTO enrollments VALUES (4, 1, 91);
        INSERT INTO enrollments VALUES (4, 4, 88);
        INSERT INTO enrollments VALUES (4, 5, 95);
        INSERT INTO enrollments VALUES (5, 3, 70);

validation:
  method: output
  expected_output: |
    Frank

hints:
  - "NOT IN excludes every student whose id appears in the subquery. The subquery returns all student_ids that have at least one enrollment."
  - "Students 1 through 5 all have at least one enrollment record. Who is missing?"
  - "Only Frank (id 6) has no enrollment records. Write: SELECT 'Frank';"

solution: |
  SELECT 'Frank';

explanation: |
  The subquery `SELECT student_id FROM enrollments` returns the set
  {1, 2, 3, 4, 5} — every student who has at least one enrollment.

  NOT IN excludes any student whose id is in that set. The only student
  whose id is NOT in {1, 2, 3, 4, 5} is Frank (id 6).

  An important caveat: if the subquery returned any NULL values, NOT IN
  would behave unexpectedly. When comparing a value to NULL with NOT IN,
  the result is "unknown" (not true and not false), so no rows would be
  returned at all. In this exercise there are no NULLs, so NOT IN works
  correctly. When NULLs are possible, use NOT EXISTS instead:

    SELECT name FROM students s
    WHERE NOT EXISTS (
      SELECT 1 FROM enrollments WHERE student_id = s.id
    );
