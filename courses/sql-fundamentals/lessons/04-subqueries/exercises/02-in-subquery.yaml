id: in-subquery
title: "IN with Subquery"
type: write

prompt: |
  Find the names of all students who are enrolled in at least one Science
  department course.

  Use an IN subquery: first find the student IDs from enrollments that match
  Science courses, then select the student names that match those IDs.

  Return each name only once (no duplicates) and order by name ascending.

  The `courses` table has a `department` column. Science courses are Biology
  and Chemistry.

starter: |
  -- Find students enrolled in Science courses
  -- Use: WHERE id IN (SELECT ... FROM ... WHERE ...)

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE students (id INTEGER, name TEXT, grade_level INTEGER);
        INSERT INTO students VALUES (1, 'Alice', 10);
        INSERT INTO students VALUES (2, 'Bob', 11);
        INSERT INTO students VALUES (3, 'Charlie', 10);
        INSERT INTO students VALUES (4, 'Diana', 12);
        INSERT INTO students VALUES (5, 'Eve', 11);
        INSERT INTO students VALUES (6, 'Frank', 12);

        CREATE TABLE courses (id INTEGER, title TEXT, department TEXT);
        INSERT INTO courses VALUES (1, 'Algebra', 'Math');
        INSERT INTO courses VALUES (2, 'Biology', 'Science');
        INSERT INTO courses VALUES (3, 'History', 'Humanities');
        INSERT INTO courses VALUES (4, 'Chemistry', 'Science');
        INSERT INTO courses VALUES (5, 'Literature', 'Humanities');

        CREATE TABLE enrollments (student_id INTEGER, course_id INTEGER, score INTEGER);
        INSERT INTO enrollments VALUES (1, 1, 88);
        INSERT INTO enrollments VALUES (1, 2, 92);
        INSERT INTO enrollments VALUES (1, 3, 75);
        INSERT INTO enrollments VALUES (2, 1, 95);
        INSERT INTO enrollments VALUES (2, 4, 78);
        INSERT INTO enrollments VALUES (3, 2, 65);
        INSERT INTO enrollments VALUES (3, 3, 82);
        INSERT INTO enrollments VALUES (3, 5, 90);
        INSERT INTO enrollments VALUES (4, 1, 91);
        INSERT INTO enrollments VALUES (4, 4, 88);
        INSERT INTO enrollments VALUES (4, 5, 95);
        INSERT INTO enrollments VALUES (5, 3, 70);

validation:
  method: output
  expected_output: |
    Alice
    Bob
    Charlie
    Diana

hints:
  - "The inner query needs to join enrollments with courses to filter by department = 'Science', then return student_id values."
  - "Use SELECT DISTINCT student_id FROM enrollments JOIN courses ON enrollments.course_id = courses.id WHERE department = 'Science' as the subquery."
  - "SELECT DISTINCT name FROM students WHERE id IN (SELECT e.student_id FROM enrollments e JOIN courses c ON e.course_id = c.id WHERE c.department = 'Science') ORDER BY name;"

solution: |
  SELECT DISTINCT name FROM students
  WHERE id IN (
    SELECT e.student_id FROM enrollments e
    JOIN courses c ON e.course_id = c.id
    WHERE c.department = 'Science'
  )
  ORDER BY name;

explanation: |
  The subquery finds all student IDs with a Science enrollment:

  1. Join enrollments to courses on course_id = id.
  2. Filter to department = 'Science' (Biology and Chemistry).
  3. Return the matching student_id values: 1, 2, 3, 4.

  The outer query then checks each student's id against that set. Alice is
  enrolled in Biology, Bob and Diana in Chemistry, and Charlie in Biology.
  Eve and Frank have no Science enrollments so they are excluded.

  DISTINCT in the outer SELECT prevents duplicates — Alice could appear
  twice if she were enrolled in both Biology and Chemistry. The IN operator
  itself handles duplicates in the subquery, but DISTINCT on the outer
  query is good practice when a student might match multiple subquery rows.
