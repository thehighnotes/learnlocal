id: scalar-subquery
title: "Scalar Subquery"
type: write

prompt: |
  A school database has `students`, `courses`, and `enrollments` tables.

  Write a query that finds the names of all students in the highest grade level.
  Use a scalar subquery to determine what the maximum grade level is, then
  select students whose `grade_level` matches that value.

  Order the results by name in ascending order.

starter: |
  -- Find students in the highest grade level
  -- Use a scalar subquery: (SELECT MAX(...) FROM ...)

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE students (id INTEGER, name TEXT, grade_level INTEGER);
        INSERT INTO students VALUES (1, 'Alice', 10);
        INSERT INTO students VALUES (2, 'Bob', 11);
        INSERT INTO students VALUES (3, 'Charlie', 10);
        INSERT INTO students VALUES (4, 'Diana', 12);
        INSERT INTO students VALUES (5, 'Eve', 11);
        INSERT INTO students VALUES (6, 'Frank', 12);

        CREATE TABLE courses (id INTEGER, title TEXT, department TEXT);
        INSERT INTO courses VALUES (1, 'Algebra', 'Math');
        INSERT INTO courses VALUES (2, 'Biology', 'Science');
        INSERT INTO courses VALUES (3, 'History', 'Humanities');
        INSERT INTO courses VALUES (4, 'Chemistry', 'Science');
        INSERT INTO courses VALUES (5, 'Literature', 'Humanities');

        CREATE TABLE enrollments (student_id INTEGER, course_id INTEGER, score INTEGER);
        INSERT INTO enrollments VALUES (1, 1, 88);
        INSERT INTO enrollments VALUES (1, 2, 92);
        INSERT INTO enrollments VALUES (1, 3, 75);
        INSERT INTO enrollments VALUES (2, 1, 95);
        INSERT INTO enrollments VALUES (2, 4, 78);
        INSERT INTO enrollments VALUES (3, 2, 65);
        INSERT INTO enrollments VALUES (3, 3, 82);
        INSERT INTO enrollments VALUES (3, 5, 90);
        INSERT INTO enrollments VALUES (4, 1, 91);
        INSERT INTO enrollments VALUES (4, 4, 88);
        INSERT INTO enrollments VALUES (4, 5, 95);
        INSERT INTO enrollments VALUES (5, 3, 70);

validation:
  method: output
  expected_output: |
    Diana
    Frank

hints:
  - "A scalar subquery returns one value. (SELECT MAX(grade_level) FROM students) gives the highest grade."
  - "Use WHERE grade_level = (subquery) to match students at that level."
  - "SELECT name FROM students WHERE grade_level = (SELECT MAX(grade_level) FROM students) ORDER BY name;"

solution: |
  SELECT name FROM students
  WHERE grade_level = (SELECT MAX(grade_level) FROM students)
  ORDER BY name;

explanation: |
  The subquery `(SELECT MAX(grade_level) FROM students)` runs first and
  returns 12 — the highest grade level in the table. The outer query then
  becomes effectively `WHERE grade_level = 12`, matching Diana and Frank.

  This is a scalar subquery because it returns exactly one value (one row,
  one column). You can use it anywhere a single value is expected: in a
  WHERE comparison, in a SELECT expression, or as a function argument.

  If you had hard-coded `WHERE grade_level = 12`, the query would break
  whenever a grade-13 student is added. The subquery keeps it dynamic.
