id: subqueries
title: "Subqueries"
description: "Write queries inside queries — scalar subqueries, IN, EXISTS, correlated references, and derived tables"
estimated_minutes: 30
content: content.md
exercises:
  - scalar-subquery
  - in-subquery
  - exists-subquery
  - correlated-subquery
  - from-subquery
  - nested-subquery
  - not-in-subquery
teaches:
  - scalar-subqueries
  - in-with-subquery
