id: min-max
title: "Minimum and Maximum"
type: predict

prompt: |
  Read the query below carefully. It finds the cheapest and most expensive
  items in the `sales` table using MIN and MAX.

  The `price` column is REAL and contains these values:
  999.99, 49.99, 19.99, 12.99, 39.99, 299.99, 24.99, 89.99, 699.99, 24.99,
  59.99, 79.99

  What output will this query produce? Type the exact output using pipe (`|`)
  to separate columns.

starter: |
  SELECT MIN(price), MAX(price) FROM sales;

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE sales (id INTEGER, product TEXT, category TEXT, quantity INTEGER, price REAL, sale_date TEXT, region TEXT);
        INSERT INTO sales VALUES (1, 'Laptop', 'Electronics', 3, 999.99, '2024-01-15', 'North');
        INSERT INTO sales VALUES (2, 'Headphones', 'Electronics', 5, 49.99, '2024-01-20', 'South');
        INSERT INTO sales VALUES (3, 'T-Shirt', 'Clothing', 8, 19.99, '2024-02-01', 'North');
        INSERT INTO sales VALUES (4, 'Novel', 'Books', 4, 12.99, '2024-02-10', 'East');
        INSERT INTO sales VALUES (5, 'Jeans', 'Clothing', 6, 39.99, '2024-02-15', 'South');
        INSERT INTO sales VALUES (6, 'Tablet', 'Electronics', 2, 299.99, '2024-03-01', 'North');
        INSERT INTO sales VALUES (7, 'Cookbook', 'Books', 7, 24.99, '2024-03-05', 'South');
        INSERT INTO sales VALUES (8, 'Jacket', 'Clothing', 10, 89.99, '2024-03-10', 'East');
        INSERT INTO sales VALUES (9, 'Phone', 'Electronics', 3, 699.99, '2024-03-15', 'South');
        INSERT INTO sales VALUES (10, 'Shorts', 'Clothing', 1, 24.99, '2024-03-20', 'North');
        INSERT INTO sales VALUES (11, 'Textbook', 'Books', 6, 59.99, '2024-04-01', 'North');
        INSERT INTO sales VALUES (12, 'Sneakers', 'Clothing', 5, 79.99, '2024-04-05', 'East');

validation:
  method: output
  expected_output: |
    12.99|999.99

hints:
  - "MIN finds the smallest value in the column. Scan the prices — which is the lowest?"
  - "MAX finds the largest value. The most expensive item costs 999.99"
  - "The output is two values on one line, separated by a pipe: 12.99|999.99"

solution: |
  SELECT MIN(price), MAX(price) FROM sales;

explanation: |
  `MIN(price)` scans all 12 price values and returns the smallest: 12.99
  (the Novel). `MAX(price)` returns the largest: 999.99 (the Laptop).

  Both functions return a single row. Since the query selects two aggregates,
  the result is one row with two columns separated by a pipe: `12.99|999.99`.

  MIN and MAX preserve the original column type. Since `price` is REAL, both
  results are REAL values. Unlike AVG which always returns REAL, MIN and MAX
  return whatever type the column stores. Applied to a TEXT column, they would
  give alphabetically first and last values.
