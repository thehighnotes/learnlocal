id: group-by-multiple
title: "Group by Multiple Columns"
type: write

prompt: |
  Write a query that shows the total quantity sold for each combination of
  category and region.

  Select three columns: `category`, `region`, and the sum of `quantity`.
  Group by both category and region. Sort the results by category first, then
  by region.

  Table schema: sales (id INTEGER, product TEXT, category TEXT, quantity INTEGER,
  price REAL, sale_date TEXT, region TEXT)

starter: |
  -- Total quantity per category and region, sorted by category then region

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE sales (id INTEGER, product TEXT, category TEXT, quantity INTEGER, price REAL, sale_date TEXT, region TEXT);
        INSERT INTO sales VALUES (1, 'Laptop', 'Electronics', 3, 999.99, '2024-01-15', 'North');
        INSERT INTO sales VALUES (2, 'Headphones', 'Electronics', 5, 49.99, '2024-01-20', 'South');
        INSERT INTO sales VALUES (3, 'T-Shirt', 'Clothing', 8, 19.99, '2024-02-01', 'North');
        INSERT INTO sales VALUES (4, 'Novel', 'Books', 4, 12.99, '2024-02-10', 'East');
        INSERT INTO sales VALUES (5, 'Jeans', 'Clothing', 6, 39.99, '2024-02-15', 'South');
        INSERT INTO sales VALUES (6, 'Tablet', 'Electronics', 2, 299.99, '2024-03-01', 'North');
        INSERT INTO sales VALUES (7, 'Cookbook', 'Books', 7, 24.99, '2024-03-05', 'South');
        INSERT INTO sales VALUES (8, 'Jacket', 'Clothing', 10, 89.99, '2024-03-10', 'East');
        INSERT INTO sales VALUES (9, 'Phone', 'Electronics', 3, 699.99, '2024-03-15', 'South');
        INSERT INTO sales VALUES (10, 'Shorts', 'Clothing', 1, 24.99, '2024-03-20', 'North');
        INSERT INTO sales VALUES (11, 'Textbook', 'Books', 6, 59.99, '2024-04-01', 'North');
        INSERT INTO sales VALUES (12, 'Sneakers', 'Clothing', 5, 79.99, '2024-04-05', 'East');

validation:
  method: output
  expected_output: |
    Books|East|4
    Books|North|6
    Books|South|7
    Clothing|East|15
    Clothing|North|9
    Clothing|South|6
    Electronics|North|5
    Electronics|South|8

hints:
  - "You need GROUP BY with two columns: GROUP BY category, region"
  - "Both category and region must appear in SELECT and GROUP BY since they are not aggregated. Use SUM(quantity) for the total."
  - "The full query is: SELECT category, region, SUM(quantity) FROM sales GROUP BY category, region ORDER BY category, region;"

solution: |
  SELECT category, region, SUM(quantity)
  FROM sales
  GROUP BY category, region
  ORDER BY category, region;

explanation: |
  Grouping by two columns creates one group for each unique (category, region)
  pair. With 3 categories and 3 regions you might expect 9 groups, but only 8
  appear because there are no Electronics sales in the East region.

  The groups and their sums:

  - Books, East: Novel (4) = 4
  - Books, North: Textbook (6) = 6
  - Books, South: Cookbook (7) = 7
  - Clothing, East: Jacket (10) + Sneakers (5) = 15
  - Clothing, North: T-Shirt (8) + Shorts (1) = 9
  - Clothing, South: Jeans (6) = 6
  - Electronics, North: Laptop (3) + Tablet (2) = 5
  - Electronics, South: Headphones (5) + Phone (3) = 8

  Multi-column GROUP BY is how you create cross-tabulations in SQL. Every
  non-aggregated column in SELECT must be listed in GROUP BY. If you forgot
  to include `region` in GROUP BY, SQLite would pick an arbitrary region
  value for each category group — almost certainly not what you want.
