id: having
title: "Filter Groups with HAVING"
type: fix

prompt: |
  This query tries to find categories where the total quantity sold exceeds 15.
  But it has a bug: it uses WHERE to filter on an aggregate, which is not
  allowed.

  Fix the query so it runs correctly. The result should show only the
  categories with total quantity greater than 15, sorted from highest total
  to lowest.

  Expected output: two rows — the category with the most units first, then
  the next.

starter: |
  SELECT category, SUM(quantity) AS total_qty
  FROM sales
  WHERE SUM(quantity) > 15
  GROUP BY category
  ORDER BY total_qty DESC;

environment:
  files:
    - path: setup.sql
      content: |
        CREATE TABLE sales (id INTEGER, product TEXT, category TEXT, quantity INTEGER, price REAL, sale_date TEXT, region TEXT);
        INSERT INTO sales VALUES (1, 'Laptop', 'Electronics', 3, 999.99, '2024-01-15', 'North');
        INSERT INTO sales VALUES (2, 'Headphones', 'Electronics', 5, 49.99, '2024-01-20', 'South');
        INSERT INTO sales VALUES (3, 'T-Shirt', 'Clothing', 8, 19.99, '2024-02-01', 'North');
        INSERT INTO sales VALUES (4, 'Novel', 'Books', 4, 12.99, '2024-02-10', 'East');
        INSERT INTO sales VALUES (5, 'Jeans', 'Clothing', 6, 39.99, '2024-02-15', 'South');
        INSERT INTO sales VALUES (6, 'Tablet', 'Electronics', 2, 299.99, '2024-03-01', 'North');
        INSERT INTO sales VALUES (7, 'Cookbook', 'Books', 7, 24.99, '2024-03-05', 'South');
        INSERT INTO sales VALUES (8, 'Jacket', 'Clothing', 10, 89.99, '2024-03-10', 'East');
        INSERT INTO sales VALUES (9, 'Phone', 'Electronics', 3, 699.99, '2024-03-15', 'South');
        INSERT INTO sales VALUES (10, 'Shorts', 'Clothing', 1, 24.99, '2024-03-20', 'North');
        INSERT INTO sales VALUES (11, 'Textbook', 'Books', 6, 59.99, '2024-04-01', 'North');
        INSERT INTO sales VALUES (12, 'Sneakers', 'Clothing', 5, 79.99, '2024-04-05', 'East');

validation:
  method: output
  expected_output: |
    Clothing|30
    Books|17

hints:
  - "WHERE filters individual rows before grouping. You cannot use aggregate functions like SUM in a WHERE clause."
  - "HAVING filters groups after aggregation. Move the condition from WHERE to HAVING, and place it after GROUP BY."
  - "Replace WHERE with HAVING after GROUP BY: SELECT category, SUM(quantity) AS total_qty FROM sales GROUP BY category HAVING SUM(quantity) > 15 ORDER BY total_qty DESC;"

solution: |
  SELECT category, SUM(quantity) AS total_qty
  FROM sales
  GROUP BY category
  HAVING SUM(quantity) > 15
  ORDER BY total_qty DESC;

explanation: |
  The original query fails because WHERE runs before GROUP BY — at that point,
  no groups exist yet, so SUM(quantity) is meaningless. SQL processes clauses
  in this order:

  1. FROM — read the sales table
  2. WHERE — filter individual rows (no aggregates allowed here)
  3. GROUP BY — group remaining rows by category
  4. Aggregates — compute SUM(quantity) for each group
  5. HAVING — filter groups based on aggregate values
  6. SELECT — choose output columns
  7. ORDER BY — sort the final result

  The fix is moving the condition from WHERE to HAVING. HAVING runs after
  GROUP BY, so aggregates like SUM(quantity) are available.

  The three category totals are:
  - Clothing: 8 + 6 + 10 + 1 + 5 = 30 (passes: 30 > 15)
  - Books: 4 + 7 + 6 = 17 (passes: 17 > 15)
  - Electronics: 3 + 5 + 2 + 3 = 13 (fails: 13 is not > 15)

  Electronics is excluded, leaving Clothing and Books. ORDER BY total_qty DESC
  puts Clothing (30) first.

  Remember: WHERE filters rows, HAVING filters groups. If your condition
  involves an aggregate function, it belongs in HAVING.
