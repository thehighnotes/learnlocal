id: selective-staging
title: "Selective Staging"
type: command
prompt: |
  Three files have been modified: `a.txt`, `b.txt`, and `c.txt`. But you only
  want to commit the changes to `a.txt` and `c.txt`. Stage just those two
  and commit them, leaving `b.txt` modified but uncommitted.

  After your commit, `b.txt` should still show as modified in `git status`.
starter: |
  # Stage only a.txt and c.txt, then commit — leave b.txt unstaged
environment:
  setup:
    - name: create-repo
      command: sh
      args: ["-c", "cd {dir} && mkdir -p repo && cd repo && git init && git branch -M main && git config user.email test@test.com && git config user.name Test && echo a > a.txt && echo b > b.txt && echo c > c.txt && git add . && git commit -m 'initial' && echo aa >> a.txt && echo bb >> b.txt && echo cc >> c.txt"]
  teardown:
    - name: capture-status
      command: sh
      args: ["-c", "cd {dir}/repo && git status --porcelain"]
      capture_to: __status.txt
    - name: capture-count
      command: sh
      args: ["-c", "cd {dir}/repo && git log --oneline | wc -l | tr -d ' '"]
      capture_to: __count.txt
  cwd: repo
validation:
  method: state
  assertions:
    - file_matches:
        path: __status.txt
        pattern: "M b\\.txt"
    - file_contains:
        path: __count.txt
        content: "2"
hints:
  - "Add specific files: `git add a.txt c.txt` — do NOT add b.txt."
  - "Then `git commit -m \"message\"` commits only what's staged."
  - "After committing, `git status` should show `b.txt` as modified."
solution: |
  git add a.txt c.txt
  git commit -m "update a and c"
explanation: |
  `git add` is selective — you choose exactly which files (or even which hunks
  within files) to stage. When you commit, only staged changes are included.
  Everything else stays in your working directory as modifications. This is how
  you create clean, focused commits even when you've changed many things at once.
