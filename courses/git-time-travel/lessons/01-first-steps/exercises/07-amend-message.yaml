id: amend-message
title: "Fix the Typo"
type: command
golf: true
prompt: |
  Someone committed a file with the message "add READEM" — a typo! The
  commit message should say "add README" instead.

  Fix the commit message without creating a new commit. The final log
  should show the corrected message.
starter: |
  # Fix the last commit message from "add READEM" to "add README"
environment:
  setup:
    - name: create-repo
      command: sh
      args: ["-c", "cd {dir} && mkdir -p repo && cd repo && git init && git branch -M main && git config user.email test@test.com && git config user.name Test && echo '# readme' > README.md && git add README.md && git commit -m 'add READEM'"]
  teardown:
    - name: capture-message
      command: sh
      args: ["-c", "cd {dir}/repo && git log -1 --format=%s"]
      capture_to: __message.txt
  cwd: repo
validation:
  method: state
  assertions:
    - file_contains:
        path: __message.txt
        content: "add README"
hints:
  - "`git commit --amend` lets you modify the most recent commit."
  - "Use the `-m` flag to provide the corrected message inline."
  - "`git commit --amend -m \"add README\"`"
solution: |
  git commit --amend -m "add README"
explanation: |
  `git commit --amend` replaces the most recent commit with a new one. When
  used with `-m`, it updates the message. You can also use it to add forgotten
  files — stage them first, then amend. The old commit is replaced (its hash
  changes), so only use amend on commits you haven't pushed to a shared repo.
