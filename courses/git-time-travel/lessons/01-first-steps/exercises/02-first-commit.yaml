id: first-commit
title: "Your First Commit"
type: command
prompt: |
  A fresh repository has been created with a `README.md` file sitting in it,
  but it hasn't been tracked yet. Stage the file and create your first commit.

  Use any commit message you like — just make sure the file is committed.
starter: |
  # Stage README.md and commit it
environment:
  setup:
    - name: create-repo
      command: sh
      args: ["-c", "cd {dir} && mkdir -p repo && cd repo && git init && git branch -M main && git config user.email test@test.com && git config user.name Test && echo '# My Project' > README.md"]
  teardown:
    - name: capture-log
      command: sh
      args: ["-c", "cd {dir}/repo && git log --oneline"]
      capture_to: __log.txt
  cwd: repo
validation:
  method: state
  assertions:
    - file_matches:
        path: __log.txt
        pattern: "^[0-9a-f]+"
hints:
  - "First stage the file: `git add README.md`"
  - "Then commit: `git commit -m \"your message\"`"
  - "You need both commands — `git add` then `git commit`."
solution: |
  git add README.md
  git commit -m "add README"
explanation: |
  Git's two-step workflow: `git add` moves changes into the staging area (the
  index), and `git commit` takes a snapshot of everything staged. The `-m` flag
  lets you write the commit message inline. Without `-m`, git opens your editor.
